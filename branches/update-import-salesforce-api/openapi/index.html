<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenAPI Documentation - SMART Base</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css"
          href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css">
    <style>
      body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
      /* WHO-styled header bar */
      .who-header {
        background-color: #00477d;
        color: #ffffff;
        padding: 0.6rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .who-header a.home-link {
        color: #ffffff;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 600;
        border: 1px solid rgba(255,255,255,0.6);
        padding: 0.25rem 0.75rem;
        border-radius: 3px;
        transition: background-color 0.2s ease;
      }
      .who-header a.home-link:hover {
        background-color: rgba(255,255,255,0.15);
        text-decoration: none;
      }
      .who-header .header-title {
        flex: 1;
      }
      /* Definition selector bar below the header */
      #definition-selector-bar {
        background-color: #0070a1;
        color: #ffffff;
        padding: 0.5rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.9rem;
        flex-wrap: wrap;
      }
      #definition-selector-bar label {
        font-weight: 600;
        white-space: nowrap;
      }
      #definition-select {
        font-size: 0.9rem;
        padding: 0.25rem 0.5rem;
        border-radius: 3px;
        border: 1px solid rgba(255,255,255,0.6);
        background-color: #ffffff;
        color: #00477d;
        min-width: 200px;
        max-width: 100%;
        flex: 1;
      }
      /* Hide Swagger UI topbar entirely */
      .swagger-ui .topbar {
        display: none;
      }
      .existing-api-content { padding: 1rem 2rem; }
    </style>
  </head>
  <body>
  <div class="who-header">
    <a href="../index.html" class="home-link">&#8962; Home</a>
    <span class="header-title">SMART Base &mdash; OpenAPI Documentation</span>
  </div>

  <div id="definition-selector-bar">
    <label for="definition-select">Select a definition:</label>
    <select id="definition-select" onchange="switchDefinition(this.value)">
    </select>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js"></script>
  <script>
  var swaggerUrls = [
  {
    "url": "../ValueSet-PreQualPresentation.openapi.json",
    "name": "WHO PreQualificaiton Presentation  Schema"
  },
  {
    "url": "../ValueSets.openapi.json",
    "name": "ValueSet Enumeration Schema"
  },
  {
    "url": "../ValueSet-PreQualVaccineType.openapi.json",
    "name": "WHO PreQualificaiton VaccineType  Schema"
  },
  {
    "url": "../ValueSet-PreQualProductIds.openapi.json",
    "name": "WHO PreQualificaiton Vaccine Product Ids Schema"
  },
  {
    "url": "../ValueSet-PreQualDatabaseMetadata.openapi.json",
    "name": "WHO PreQualification Database Metadata Schema"
  },
  {
    "url": "../StructureDefinition-PreQualDBAPI.openapi.json",
    "name": "WHO Vaccine PreQual DB (API)"
  },
  {
    "url": "../StructureDefinition-PreQualSiteDetail.openapi.json",
    "name": "WHO PreQual Site Detail"
  },
  {
    "url": "../StructureDefinition-PreQualDB.openapi.json",
    "name": "WHO Vaccine PreQual DB"
  },
  {
    "url": "../StructureDefinition-PreQualProduct.openapi.json",
    "name": "WHO PreQual Product"
  },
  {
    "url": "../StructureDefinition-PreQualProductIngredient.openapi.json",
    "name": "WHO PreQual Product Ingredient"
  },
  {
    "url": "../StructureDefinition-PreQualBulkSupplier.openapi.json",
    "name": "WHO PreQual Bulk Supplier"
  },
  {
    "url": "../StructureDefinition-PreQualNRA.openapi.json",
    "name": "WHO PreQual NRA"
  },
  {
    "url": "../StructureDefinition-PreQualProductPackaging.openapi.json",
    "name": "WHO PreQual Product Packaging"
  },
  {
    "url": "../LogicalModels.openapi.json",
    "name": "Logical Model Enumeration Schema"
  },
  {
    "url": "../StructureDefinition-PreQualDocumentDetail.openapi.json",
    "name": "WHO PreQual Document Detail"
  },
  {
    "url": "../StructureDefinition-PreQualManufacturer.openapi.json",
    "name": "WHO PreQual Manufacturer"
  },
  {
    "url": "../StructureDefinition-PreQualVaccine.openapi.json",
    "name": "WHO PreQual Vaccine"
  },
  {
    "url": "../StructureDefinition-PreQualDBwithIds.openapi.json",
    "name": "WHO Vaccine PreQual DB with IDs"
  }
];
  var ui;
  window.onload = function() {
    var select = document.getElementById('definition-select');
    swaggerUrls.forEach(function(item, idx) {
      var opt = document.createElement('option');
      opt.value = item.url;
      opt.textContent = item.name;
      select.appendChild(opt);
    });
    ui = SwaggerUIBundle({
      url: "../ValueSet-PreQualPresentation.openapi.json",
      dom_id: '#swagger-ui',
      presets: [SwaggerUIBundle.presets.apis],
      layout: "BaseLayout"
    });
  };
  function switchDefinition(url) {
    ui.specActions.updateUrl(url);
    ui.specActions.download(url);
  }
  </script>

  </body>
</html>
